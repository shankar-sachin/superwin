<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SuperWin Graphing</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="mathlive.min.js"></script>
  <script defer src="app.js"></script>
</head>
<body class="dark">
  <div id="toolbar">
    <button id="ins-frac"  type="button" title="Fraction">a&frasl;b</button>
    <button id="ins-sqrt"  type="button" title="Square root">&radic;</button>
    <button id="ins-pow"   type="button" title="Exponent">x&#x207F;</button>
    <button id="ins-sum"   type="button" title="Summation">&Sigma;</button>
    <button id="ins-prod"  type="button" title="Product">&Pi;</button>
    <button id="ins-int"   type="button" title="Integral">&int;</button>
    <button id="ins-deriv" type="button" title="Derivative d/dx">d&frasl;dx</button>
    <button id="ins-pi"    type="button" title="Pi">&pi;</button>
  </div>
  <div id="rows"></div>
  <button id="add" type="button">＋ Add expression</button>
  <div id="brand">SuperMathFont v2.1</div>
</body>
</html>
